services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../index.html:/srv/site/index.html:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
